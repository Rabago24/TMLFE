<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TMLFE | Trade Machine</title>

<link rel="stylesheet" href="style.css">

</head>


<body>



<header class="top-bar">

<div class="logo">
TMLFE
</div>


<div class="title">
Trade Machine
</div>


</header>





<nav class="menu">


<button onclick="window.location.href='index.html'">
Dashboard
</button>


<button onclick="window.location.href='players.html'">
Jugadores
</button>


<button onclick="window.location.href='teams.html'">
Plantillas
</button>


<button>
Traspasos
</button>



</nav>






<main>



<section class="hero">


<h1>
Simulador de Traspasos
</h1>


<p>
Crea y valida movimientos entre franquicias
</p>


</section>







<section class="trade-box">



<div class="card">


<h2>
Equipo que envía
</h2>


<select id="equipo-origen">

<option>
Seleccionar equipo
</option>

</select>



<h3>
Jugadores enviados
</h3>


<textarea
id="jugadores-sale"
placeholder="Ejemplo:
Jugador 1
Jugador 2">
</textarea>



</div>







<div class="card">


<h2>
Equipo que recibe
</h2>


<select id="equipo-destino">


<option>
Seleccionar equipo
</option>


</select>




<h3>
Jugadores recibidos
</h3>



<textarea
id="jugadores-llegan"
placeholder="Ejemplo:
Jugador 3">
</textarea>



</div>



</section>








<section class="card">


<h2>
Análisis del movimiento
</h2>



<button
onclick="analizarTrade()">

VALIDAR TRADE

</button>




<div id="resultado-trade">

</div>


</section>






</main>







<script src="database.js"></script>

<script src="teams.js"></script>

<script src="players.js"></script>

<script src="salary.js"></script>

<script src="trades.js"></script>

<script src="ui.js"></script>

<script src="trade.js"></script>

<script src="app.js"></script>



</body>

</html>
